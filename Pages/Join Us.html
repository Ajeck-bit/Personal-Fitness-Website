<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Us Page</title>
    <link rel="stylesheet" href="/Styles/Join Us.css" />
  </head>
  <body>
    <section class="info">
      <img src="/Asset/Logo.jpg" alt="" />
      <h3>Sign up to Get in touch with Us</h3>
      <div class="form">
        <label for="name">
          <input type="text" placeholder="Your full name...." />
        </label>
        <label for="email">
          <input type="email" placeholder="Your current email...." />
        </label>
        <label for="password">
          <input type="password" placeholder="Your password..." />
        </label>
        <label for="password2">
          <input type="password" placeholder="Confirm your password...." />
        </label>
        
        <button type="submit" id="button1">SUBMIT</button>
    </section>
  </body>
</html>
